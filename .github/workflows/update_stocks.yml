name: Update Stock Data

on:
  schedule:
    # 日本株終値後: JST 16:00 = UTC 07:00（月〜金）
    - cron: '0 7 * * 1-5'
    # 米国株終値後: JST 07:00 = UTC 22:00 前日（日〜木）
    - cron: '0 22 * * 0-4'
  workflow_dispatch:  # GitHub 画面から手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # stocks.json をコミット・プッシュするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch stock data
        run: python scripts/fetch_stocks.py

      - name: Commit and push stocks.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks.json
          # 変更がなければコミットしない
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update stock data $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && git push
