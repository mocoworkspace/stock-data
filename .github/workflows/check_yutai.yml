name: Check Yutai Disclosures

on:
  schedule:
    # 毎週月曜 JST 07:00 = UTC 22:00 日曜（過去8日分をチェック）
    - cron: '0 22 * * 0'
  workflow_dispatch:  # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 通知済みリスト（seen_disclosures.json）のコミットに必要
      issues: write  # 検知時に Issue を作成するために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Check TDnet disclosures
        run: python scripts/check_yutai_disclosures.py

      - name: Create issue if hits found
        if: ${{ hashFiles('yutai_report.md') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GitHub API の一時障害に備えて最大3回リトライ
          for i in 1 2 3; do
            if gh issue create --repo "${{ github.repository }}" \
              --title "【株価アプリ】📋 株主優待関連の開示を検知 ($(date +'%Y-%m-%d'))" \
              --body-file yutai_report.md; then
              exit 0
            fi
            echo "attempt $i failed; retrying in 60s..."
            sleep 60
          done
          exit 1

      - name: Commit seen list
        if: ${{ hashFiles('yutai_report.md') != '' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/seen_disclosures.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update seen disclosures" && git push
